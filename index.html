<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage Demo | 仿终末地风格</title>
    <style>
        :root {
            --accent-color: #ff4d00; /* 终末地标志性的橙色 */
            --bg-dark: #0a0a0a;
            --text-main: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 动态星空背景层 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            z-index: -1;
        }

        /* 模拟扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
        }

        /* 主容器 */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        /* 装饰性UI边框 */
        .ui-box {
            position: relative;
            padding: 40px 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }

        .title {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        /* 交互按钮 */
        .btn {
            padding: 12px 40px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="ui-box">
            <div class="title">ENDFIELD</div>
            <div class="subtitle">VOYAGE TO THE STARS // 踏星之旅</div>
            <button class="btn">开始协议</button>
        </div>
    </div>

</body>
</html>
