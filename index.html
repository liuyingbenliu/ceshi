<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield | 极效协议终端</title>
    <style>
        :root {
            --accent: #ff4d00;
            --accent-glow: rgba(255, 77, 0, 0.5);
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); overflow: hidden;
            color: #fff; font-family: "Orbitron", "Segoe UI", sans-serif;
            text-transform: uppercase;
        }

        /* --- 华丽入场扫描线 --- */
        #warp-line {
            position: fixed; top: 50%; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--accent);
            z-index: 1000; transform: scaleX(0); opacity: 0;
            transition: transform 0.5s ease-in, opacity 0.2s;
        }

        /* --- 启动屏 --- */
        #splash-screen {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 100; background: #000; transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .auth-card {
            padding: 60px; border: 1px solid var(--glass-border);
            background: var(--glass); backdrop-filter: blur(15px);
            text-align: center; position: relative;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .auth-card h1 { font-size: 3.5rem; letter-spacing: 15px; margin: 0; font-weight: 900; }
        .auth-card p { color: var(--accent); font-size: 0.8rem; letter-spacing: 5px; margin: 20px 0 40px; }

        .btn-launch {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 18px 60px; cursor: pointer;
            letter-spacing: 8px; transition: 0.4s; font-weight: bold;
        }
        .btn-launch:hover { background: var(--accent); color: #fff; box-shadow: 0 0 40px var(--accent); }

        /* --- 星轨背景 --- */
        #star-canvas { position: fixed; inset: 0; z-index: 1; opacity: 0; transition: opacity 2s; }

        /* --- 主UI面板 --- */
        #main-ui {
            position: fixed; inset: 0; z-index: 10; display: none;
            padding: 80px; grid-template-columns: 450px 1fr; align-items: center;
        }

        .side-panel {
            background: var(--glass); border-left: 5px solid var(--accent);
            padding: 40px; backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            transform: perspective(1000px) rotateY(15deg);
            opacity: 0; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .side-panel.active { opacity: 1; transform: perspective(1000px) rotateY(0deg); }

        /* 内容切换动画容器 */
        .content-wrapper { position: relative; height: 300px; overflow: hidden; }
        
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%;
            opacity: 0; transform: translateX(-30px);
            transition: all 0.5s ease; pointer-events: none;
        }
        .tab-content.active {
            opacity: 1; transform: translateX(0);
            pointer-events: auto; position: relative;
        }

        .panel-tag { color: var(--accent); font-size: 0.7rem; margin-bottom: 10px; font-family: monospace; }
        .panel-title { font-size: 2.2rem; margin: 0 0 20px 0; font-weight: 800; }
        .panel-body { color: #ddd; line-height: 1.8; font-size: 0.95rem; }

        .glitch-bar {
            width: 100%; height: 2px; background: linear-gradient(90deg, var(--accent), transparent);
            margin-top: 30px; position: relative;
        }

        /* 导航菜单 */
        .nav-footer { position: absolute; bottom: 80px; left: 80px; display: flex; gap: 20px; }
        .nav-btn {
            padding: 10px 30px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.6); cursor: pointer; color: #fff;
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-btn.active, .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

    <div id="warp-line"></div>

    <div id="splash-screen">
        <div class="auth-card">
            <h1>ENDFIELD</h1>
            <p>NEURAL LINK SYSTEM</p>
            <button class="btn-launch" onclick="triggerWarp()">激活协议</button>
        </div>
    </div>

    <canvas id="star-canvas"></canvas>

    <div id="main-ui">
        <div class="side-panel" id="side-panel">
            <div class="panel-tag">// PROTOCOL_STREAM_CONNECTED</div>
            
            <div class="content-wrapper">
                <div id="page-home" class="tab-content active">
                    <h2 class="panel-title">系统状态</h2>
                    <div class="panel-body">
                        正在同步塔卫二（Talos-II）高轨道数据。
                        全频谱多色星轨监测已开启，当前读数：正常。
                    </div>
                </div>

                <div id="page-info" class="tab-content">
                    <h2 class="panel-title">干员档案</h2>
                    <div class="panel-body">
                        姓名：佩丽卡 (Perica)<br>
                        权限等级：Level 5<br>
                        状态：正在执行星区协议...
                    </div>
                </div>

                <div id="page-db" class="tab-content">
                    <h2 class="panel-title">MC 数据库</h2>
                    <div class="panel-body">
                        正在连接服务器：Talos-Core<br>
                        在线人数：24 / 100<br>
                        延迟：24ms
                    </div>
                </div>
            </div>

            <div class="glitch-bar"></div>
        </div>

        <div class="nav-footer">
            <div class="nav-btn active" onclick="switchPage('home', this)">概览</div>
            <div class="nav-btn" onclick="switchPage('info', this)">情报</div>
            <div class="nav-btn" onclick="switchPage('db', this)">数据库</div>
            <div class="nav-btn" onclick="location.reload()">退出</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let speedMultiplier = 1;
        const colors = ['rgba(255, 77, 0, ', 'rgba(0, 200, 255, ', 'rgba(200, 100, 255, ', 'rgba(255, 255, 255, '];

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.size = Math.random() * 2.5 + 1.5;
                this.speed = (Math.random() * 0.002 + 0.0005);
                this.color = colors[Math.floor(Math.random() * colors.length)] + (Math.random() * 0.6 + 0.3) + ')';
            }
            update() { this.angle += this.speed * speedMultiplier; }
            draw() {
                const x = canvas.width/2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height/2 + Math.sin(this.angle) * this.dist;
                const lastX = canvas.width/2 + Math.cos(this.angle - this.speed * 5 * speedMultiplier) * this.dist;
                const lastY = canvas.height/2 + Math.sin(this.angle - this.speed * 5 * speedMultiplier) * this.dist;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
            }
        }

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 400; i++) stars.push(new Star());
        }

        function animate() {
            ctx.fillStyle = `rgba(0, 0, 0, ${speedMultiplier > 5 ? 0.2 : 0.06})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        function triggerWarp() {
            const warpLine = document.getElementById('warp-line');
            const splash = document.getElementById('splash-screen');
            warpLine.style.opacity = '1'; warpLine.style.transform = 'scaleX(1)';
            
            setTimeout(() => {
                splash.style.opacity = '0'; splash.style.transform = 'scale(1.3)';
                document.getElementById('star-canvas').style.opacity = '1';
                document.getElementById('main-ui').style.display = 'grid';
                initStars(); animate();
                speedMultiplier = 25;
                let decel = setInterval(() => {
                    speedMultiplier *= 0.88;
                    if(speedMultiplier <= 1.1) {
                        speedMultiplier = 1; clearInterval(decel);
                        document.getElementById('side-panel').classList.add('active');
                    }
                }, 50);
                setTimeout(() => warpLine.style.opacity = '0', 300);
            }, 600);
        }

        // --- 核心切换逻辑 ---
        function switchPage(pageId, btn) {
            // 1. 切换按钮状态
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 2. 切换内容显示
            const target = document.getElementById('page-' + pageId);
            if (target.classList.contains('active')) return;

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 稍微延迟一点点，让消失和出现更丝滑
            setTimeout(() => {
                target.classList.add('active');
            }, 50);
        }

        window.addEventListener('resize', initStars);
    </script>
</body>
</html>
