<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield | 协议终端</title>
    <style>
        :root {
            --accent: #ff4d00;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); overflow: hidden;
            color: #fff; font-family: "Segoe UI", "PingFang SC", sans-serif;
        }

        /* --- 全局装饰 --- */
        .overlay-deco {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 5;
        }

        /* --- 1. 启动大厅 (Splash) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; background: #000;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .auth-card {
            padding: 50px 80px; border: 1px solid var(--glass-border);
            background: var(--glass); backdrop-filter: blur(10px);
            text-align: center; position: relative;
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
        }

        .auth-card h1 { font-size: 3rem; letter-spacing: 12px; margin: 0; font-weight: 900; }
        .auth-card p { color: var(--accent); font-size: 0.8rem; letter-spacing: 4px; margin: 15px 0 40px; }

        .btn-launch {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 15px 45px; cursor: pointer;
            letter-spacing: 5px; transition: 0.3s;
        }

        .btn-launch:hover {
            background: var(--accent); color: #fff; box-shadow: 0 0 30px var(--accent);
        }

        /* --- 2. 星轨画布 --- */
        #star-canvas {
            position: fixed; top: 0; left: 0; z-index: 1;
            opacity: 0; transition: opacity 3s ease;
        }

        /* --- 3. 交互 UI 面板 --- */
        #main-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: none; padding: 60px;
            grid-template-columns: 420px 1fr; align-items: center;
            animation: uiFadeIn 2s ease forwards;
        }

        .side-panel {
            background: var(--glass); border-left: 3px solid var(--accent);
            padding: 40px; backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .panel-tag { color: var(--accent); font-size: 0.7rem; margin-bottom: 10px; opacity: 0.8; }
        .panel-title { font-size: 2rem; margin: 0 0 20px 0; font-weight: 800; letter-spacing: 2px; }
        .panel-body { color: #ccc; line-height: 1.8; font-size: 0.95rem; margin-bottom: 30px; }

        /* 底部导航 */
        .nav-footer {
            position: absolute; bottom: 60px; left: 60px;
            display: flex; gap: 20px;
        }

        .nav-btn {
            padding: 10px 25px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5); cursor: pointer;
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            border-color: var(--accent); color: var(--accent);
        }

        @keyframes uiFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="overlay-deco"></div>

    <div id="splash-screen">
        <div class="auth-card">
            <h1>ENDFIELD</h1>
            <p>VOYAGE TO THE STARS</p>
            <button class="btn-launch" onclick="startProtocol()">激活同步协议</button>
        </div>
    </div>

    <canvas id="star-canvas"></canvas>

    <div id="main-ui">
        <div class="side-panel">
            <div class="panel-tag">// TERMINAL_DATA_DECRYPTED</div>
            <h2 id="ui-header" class="panel-title">系统就绪</h2>
            <div id="ui-body" class="panel-body">
                欢迎来到终末地协议终端。正在实时监测塔卫二的星轨频率。
                当前连接状态稳定，等待进一步指令。
            </div>
            <div style="width: 100%; height: 2px; background: linear-gradient(90deg, var(--accent), transparent);"></div>
        </div>

        <div class="nav-footer">
            <div class="nav-btn active" onclick="updateContent('home', this)">概览</div>
            <div class="nav-btn" onclick="updateContent('info', this)">情报</div>
            <div class="nav-btn" onclick="location.reload()">重启</div>
        </div>
    </div>

    <script>
        // --- 星轨渲染引擎 ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const starCount = 450;

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // 计算相对于中心点的距离和角度
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.speed = (Math.random() * 0.003 + 0.001); // 旋转速度
                this.brightness = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.angle += this.speed;
            }
            draw() {
                const x = canvas.width / 2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height / 2 + Math.sin(this.angle) * this.dist;
                const lastX = canvas.width / 2 + Math.cos(this.angle - this.speed) * this.dist;
                const lastY = canvas.height / 2 + Math.sin(this.angle - this.speed) * this.dist;

                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 77, 0, ${this.brightness})`;
                ctx.lineWidth = 1;
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < starCount; i++) stars.push(new Star());
        }

        function animate() {
            // 通过不完全清空画笔实现长拖尾星轨
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- 交互逻辑 ---
        function startProtocol() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('star-canvas').style.opacity = '1';
                document.getElementById('main-ui').style.display = 'grid';
                initStars();
                animate();
            }, 1000);
        }

        function updateContent(type, el) {
            const header = document.getElementById('ui-header');
            const body = document.getElementById('ui-body');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            if(type === 'home') {
                header.innerText = "系统就绪";
                body.innerText = "欢迎来到终末地协议终端。正在实时监测塔卫二的星轨频率。当前连接状态稳定。";
            } else {
                header.innerText = "情报解密";
                body.innerText = "正在读取 MC 服务器核心数据... 塔卫二地表环境监测中。当前在线协议员：12/50。";
            }
        }

        window.addEventListener('resize', () => {
            if(document.getElementById('main-ui').style.display === 'grid') initStars();
        });
    </script>
</body>
</html>
