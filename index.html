<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX server | 未来与奇迹</title>
    <style>
        :root {
            --accent: #ff4d00;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); overflow: hidden;
            color: #fff; font-family: "Segoe UI", sans-serif;
            text-transform: uppercase;
        }

        /* --- 装饰层 --- */
        .overlay-deco {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 5; pointer-events: none; 
        }

        #warp-line {
            position: fixed; top: 50%; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 20px var(--accent);
            z-index: 1000; transform: scaleX(0); opacity: 0;
            transition: transform 0.5s ease-in, opacity 0.2s; pointer-events: none;
        }

        /* --- 启动屏 --- */
        #splash-screen {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 200; background: #000; transition: all 0.8s ease;
        }

        .auth-card {
            padding: 60px; border: 1px solid var(--glass-border);
            background: var(--glass); backdrop-filter: blur(15px);
            text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-launch {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 18px 60px; cursor: pointer;
            letter-spacing: 8px; font-weight: bold; font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-launch:hover { background: var(--accent); color: #fff; box-shadow: 0 0 30px var(--accent); }

        #star-canvas { 
            position: fixed; inset: 0; z-index: 1; opacity: 0; 
            transition: opacity 2s; pointer-events: none; 
        }

        /* --- 主UI层 --- */
        #main-ui {
            position: fixed; inset: 0; z-index: 100; 
            display: none; padding: 80px;
            grid-template-columns: 450px 1fr; align-items: center;
            pointer-events: none;
        }

        .side-panel {
            background: var(--glass); border-left: 5px solid var(--accent);
            padding: 40px; backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            opacity: 0; transform: translateX(-50px);
            transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            pointer-events: auto;
        }
        .side-panel.active { opacity: 1; transform: translateX(0); }

        .content-wrapper { position: relative; min-height: 200px; }
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%;
            opacity: 0; transform: translateY(10px);
            transition: 0.4s ease; pointer-events: none;
        }
        .tab-content.active {
            opacity: 1; transform: translateY(0);
            pointer-events: auto; position: relative;
        }

        .panel-title { font-size: 2.2rem; margin: 0 0 15px 0; color: var(--accent); }
        .panel-body { color: #ccc; line-height: 1.8; font-size: 1rem; }

        .nav-footer { 
            position: absolute; bottom: 80px; left: 80px; 
            display: flex; gap: 20px; pointer-events: auto;
        }
        .nav-btn {
            padding: 12px 35px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.8); cursor: pointer; color: #fff;
            font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,77,0,0.1); }

    </style>
</head>
<body>

    <div class="overlay-deco"></div>
    <div id="warp-line"></div>

    <div id="splash-screen">
        <div class="auth-card">
            <h1 style="font-size: 3rem; letter-spacing: 15px;">奇迹城</h1>
            <p style="letter-spacing: 5px; color: var(--accent);">梦想与奇迹</p>
            <button class="btn-launch" onclick="launch()">连接终端</button>
        </div>
    </div>

    <canvas id="star-canvas"></canvas>

    <div id="main-ui">
        <div class="side-panel" id="side-panel">
            <div style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px;">// TERMINAL_LINK_SUCCESS</div>
            
            <div class="content-wrapper">
                <div id="page-home" class="tab-content active">
                    <h2 class="panel-title">概览</h2>
                    <p class="panel-body">当前坐标：梦绘未来。<br>赛季时间：（UTC+8）2026.3.4--2026.6.20</p>
                </div>
                <div id="page-info" class="tab-content">
                    <h2 class="panel-title">服务器数据</h2>
                    <p class="panel-body">类型：公益<br>当前版本：S5 <br>状态：运行中</p>
                </div>
                <div id="page-db" class="tab-content">
                    <h2 class="panel-title">关于服务器</h2>
                    <p class="panel-body">奇迹城理事会：服务器最高管理层<br>梦想铁道：中央铁路系统<br>浩泽轨交：次中央铁路系统<br>终端版本：1.19.2</p>
                </div>
            </div>
            
            <div style="width: 100%; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); margin-top: 20px;"></div>
        </div>

        <div class="nav-footer">
            <div class="nav-btn active" onclick="switchTab('home', this)">概览</div>
            <div class="nav-btn" onclick="switchTab('info', this)">服务器数据</div>
            <div class="nav-btn" onclick="switchTab('db', this)">关于服务器</div>
            <div class="nav-btn" onclick="location.reload()">重启系统</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let meteors = [];
        let trainX = -1000;
        let speedMultiplier = 1;
        const colors = ['rgba(255, 77, 0, ', 'rgba(0, 200, 255, ', 'rgba(180, 100, 255, ', 'rgba(255, 255, 255, '];

        // --- 科技流星类 ---
        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * (canvas.height / 2);
                this.len = Math.random() * 80 + 50;
                this.speed = Math.random() * 15 + 10;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speed * speedMultiplier;
                this.y += this.speed * 0.5 * speedMultiplier;
                if (this.x > canvas.width || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                let gradient = ctx.createLinearGradient(this.x, this.y, this.x - this.len, this.y - this.len/2);
                gradient.addColorStop(0, this.color + '0.8)');
                gradient.addColorStop(0.2, this.color + '0.4)');
                gradient.addColorStop(1, 'transparent');
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.len, this.y - this.len/2);
                ctx.stroke();
                // 头部光点
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 核心旋转星星类 ---
        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.size = Math.random() * 2 + 1;
                this.speed = (Math.random() * 0.001 + 0.0003);
                this.color = colors[Math.floor(Math.random() * colors.length)] + (Math.random() * 0.5 + 0.3) + ')';
            }
            update() { this.angle += this.speed * speedMultiplier; }
            draw() {
                const x = canvas.width/2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height/2 + Math.sin(this.angle) * this.dist;
                const lastX = canvas.width/2 + Math.cos(this.angle - this.speed * 4 * speedMultiplier) * this.dist;
                const lastY = canvas.height/2 + Math.sin(this.angle - this.speed * 4 * speedMultiplier) * this.dist;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
            }
        }

        function drawGhostTrain() {
            ctx.save();
            ctx.globalAlpha = 0.15; // 隐隐约约
            ctx.strokeStyle = "rgba(0, 200, 255, 0.8)";
            ctx.lineWidth = 1;
            
            const trainY = canvas.height * 0.75;
            trainX += 2 * speedMultiplier;
            if (trainX > canvas.width + 500) trainX = -800;

            // 绘制简易几何列车线框
            for(let i=0; i<5; i++) { // 5节车厢
                let bx = trainX - (i * 110);
                // 车身
                ctx.strokeRect(bx, trainY, 100, 30);
                // 窗户
                ctx.strokeRect(bx + 10, trainY + 5, 20, 10);
                ctx.strokeRect(bx + 40, trainY + 5, 20, 10);
                ctx.strokeRect(bx + 70, trainY + 5, 20, 10);
                // 轨道阴影线
                ctx.beginPath();
                ctx.moveTo(bx, trainY + 35);
                ctx.lineTo(bx + 100, trainY + 35);
                ctx.stroke();
            }
            ctx.restore();
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = []; meteors = [];
            for (let i = 0; i < 250; i++) stars.push(new Star());
            for (let i = 0; i < 8; i++) meteors.push(new Meteor());
        }

        function animate() {
            // 保持星轨长拖尾效果
            ctx.fillStyle = `rgba(0, 0, 0, ${speedMultiplier > 5 ? 0.2 : 0.08})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGhostTrain();
            stars.forEach(s => { s.update(); s.draw(); });
            meteors.forEach(m => { m.update(); m.draw(); });
            
            requestAnimationFrame(animate);
        }

        function launch() {
            const splash = document.getElementById('splash-screen');
            const warp = document.getElementById('warp-line');
            warp.style.opacity = '1'; warp.style.transform = 'scaleX(1)';
            
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.2)';
                document.getElementById('star-canvas').style.opacity = '1';
                document.getElementById('main-ui').style.display = 'grid';
                initCanvas(); animate();
                
                speedMultiplier = 35; 
                let decel = setInterval(() => {
                    speedMultiplier *= 0.88;
                    if(speedMultiplier <= 1.1) {
                        speedMultiplier = 1; clearInterval(decel);
                        document.getElementById('side-panel').classList.add('active');
                    }
                }, 50);

                setTimeout(() => { splash.style.display = 'none'; warp.style.opacity = '0'; }, 800);
            }, 500);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
