<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Kivotos Countdown</title>
    <style>
        :root {
            --ba-blue: #00aeef;
            --ba-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #002d4a;
            /* 更有层次感的深蓝色背景 */
            background: radial-gradient(circle at center, #005a8d 0%, #001a2c 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }

        /* 容器在中上位置 */
        .container {
            position: relative;
            margin-top: 20vh;
            width: 600px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- 核心光环组 --- */
        .halo-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            z-index: 1;
            perspective: 800px; /* 3D 视距 */
        }

        .ring {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid var(--ba-blue);
            box-shadow: 0 0 15px rgba(0, 174, 239, 0.5), inset 0 0 15px rgba(0, 174, 239, 0.5);
            transform-style: preserve-3d;
        }

        /* 外环：虚线快速旋转 */
        .ring-outer {
            border: 2px dashed rgba(255, 255, 255, 0.4);
            animation: ringRotate 10s linear infinite;
        }

        /* 内环：实体慢速旋转 */
        .ring-inner {
            width: 80%; height: 80%;
            top: 10%; left: 10%;
            border: 3px solid var(--ba-blue);
            opacity: 0.6;
            animation: ringRotate 20s linear infinite reverse;
        }

        @keyframes ringRotate {
            /* 这里的 rotateX 从 60 减小到 45，让光环更清晰可见 */
            0% { transform: rotateX(45deg) rotateZ(0deg); }
            100% { transform: rotateX(45deg) rotateZ(360deg); }
        }

        /* --- 倒计时文字 --- */
        .timer-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            text-shadow: 0 0 20px rgba(0, 174, 239, 1);
        }

        .mission-text {
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--ba-blue);
            margin-bottom: 10px;
            font-weight: bold;
        }

        #countdown {
            font-size: 4.5rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
        }

        .unit {
            font-size: 1rem;
            margin: 0 5px;
            font-weight: normal;
            vertical-align: middle;
        }

        /* --- 流星轨迹 --- */
        .meteor {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, #fff);
            opacity: 0.8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translate(0, 0) rotate(-35deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-400px, 800px) rotate(-35deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="halo-system">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
        </div>

        <div class="timer-content">
            <div class="mission-text">SCHALE STATUS: COUNTING</div>
            <div id="countdown">00<span class="unit">d</span> 00<span class="unit">h</span> 00<span class="unit">m</span> 00<span class="unit">s</span></div>
        </div>
    </div>

    <script>
        function update() {
            const target = new Date(2026, 5, 1); // 6月1日
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerText = "00:00:00:00";
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);

            const f = (n) => n.toString().padStart(2, '0');
            document.getElementById('countdown').innerHTML = 
                `${f(d)}<span class="unit">d</span> ${f(h)}<span class="unit">h</span> ${f(m)}<span class="unit">m</span> ${f(s)}<span class="unit">s</span>`;
        }

        function createMeteor() {
            const m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.top = '-50px';
            m.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 2000);
        }

        setInterval(update, 1000);
        setInterval(createMeteor, 800);
        update();
    </script>
</body>
</html>
