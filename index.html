<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield Terminal | 终末地协议</title>
    <style>
        :root {
            --accent: #ff4d00;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-gray: #a0a0a0;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            height: 100vh;
            text-transform: uppercase;
        }

        /* --- 扫描线全局装饰 --- */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 200; pointer-events: none; opacity: 0.4;
        }

        /* --- 1. 初始激活页面 --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; background: #000;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s;
        }

        .auth-container {
            position: relative; padding: 60px 100px;
            border: 1px solid var(--glass-border);
            background: radial-gradient(circle at center, rgba(40,40,40,0.2) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(10px);
            clip-path: polygon(0 15%, 5% 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
            text-align: center;
        }

        .auth-container::before {
            content: "SYSTEM ID: ENDFIELD-03";
            position: absolute; top: 10px; left: 20px;
            font-size: 10px; color: var(--accent); opacity: 0.6;
        }

        .title-main { font-size: 3.5rem; letter-spacing: 15px; margin: 0; font-weight: 900; }
        .title-sub { font-size: 0.8rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 40px; }

        .btn-activate {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 15px 50px; cursor: pointer;
            font-size: 1rem; letter-spacing: 3px; position: relative;
            transition: all 0.3s; overflow: hidden;
        }

        .btn-activate:hover {
            background: var(--accent); color: white;
            box-shadow: 0 0 30px rgba(255, 77, 0, 0.4);
        }

        /* --- 2. 星空背景层 --- */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0; transition: opacity 2s ease;
        }

        /* --- 3. 核心交互面板 --- */
        #dashboard {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: none; padding: 80px;
            grid-template-columns: 450px 1fr;
            animation: fadeIn 1.5s ease forwards;
        }

        .sidebar {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent); padding: 40px;
            backdrop-filter: blur(20px); position: relative;
        }

        .sidebar h2 { color: var(--accent); margin-top: 0; font-size: 1.8rem; }

        .info-content {
            margin-top: 30px; font-size: 0.9rem; line-height: 1.8;
            color: #ddd; display: none; animation: slideUp 0.5s ease forwards;
        }

        .info-content.active { display: block; }

        /* 装饰性小元素 */
        .decoration-corner {
            position: absolute; bottom: 10px; right: 10px;
            width: 50px; height: 50px; border-right: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent); opacity: 0.5;
        }

        /* 导航菜单 */
        .nav-bar {
            position: absolute; bottom: 80px; left: 80px;
            display: flex; gap: 30px; z-index: 20;
        }

        .nav-item {
            padding: 12px 30px; border: 1px solid var(--glass-border);
            cursor: pointer; font-size: 0.8rem; letter-spacing: 2px;
            transition: 0.3s; background: rgba(0,0,0,0.3);
        }

        .nav-item:hover, .nav-item.active {
            border-color: var(--accent); color: var(--accent);
            background: rgba(255, 77, 0, 0.05);
        }

        /* --- 动画效果 --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <div class="scanline"></div>

    <div id="login-screen">
        <div class="auth-container">
            <h1 class="title-main">ENDFIELD</h1>
            <div class="title-sub">VOYAGE TO THE STARS // 踏星之旅</div>
            <button class="btn-activate" onclick="launchSystem()">确认协议连接</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="stars"></canvas>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div id="content-op" class="info-content active">
                <h2>OPERATOR: PERICA</h2>
                <p>姓名：佩丽卡</p>
                <p>归属：终末地工业</p>
                <p style="color: var(--text-gray); border-top: 1px solid #333; padding-top: 20px;">
                    “确认目标坐标，协议开始执行。所有协议干员请各就各位。”
                </p>
                <div style="width: 100%; height: 200px; background: rgba(255,255,255,0.05); margin-top:20px; border: 1px dashed #444;">
                    </div>
            </div>

            <div id="content-world" class="info-content">
                <h2>LOCATION: TALOS-II</h2>
                <p>目标：塔卫二</p>
                <p>状态：强侵蚀环境</p>
                <p style="color: var(--text-gray); border-top: 1px solid #333; padding-top: 20px;">
                    这是一个危机四伏的世界。开拓者们需要建立能源枢纽，在荒野中开辟文明的绿洲。
                </p>
            </div>

            <div class="decoration-corner"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('op', this)">干员情报</div>
            <div class="nav-item" onclick="switchTab('world', this)">世界概况</div>
            <div class="nav-item" onclick="location.reload()">断开连接</div>
        </div>
    </div>

    <script>
        // --- 星空背景逻辑 ---
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let starArray = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            starArray = [];
            for(let i=0; i<300; i++) {
                starArray.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.2 + 0.05
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            starArray.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y -= s.speed; // 星星向上漂移
                if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        // --- 转场控制逻辑 ---
        function launchSystem() {
            const login = document.getElementById('login-screen');
            login.style.opacity = '0';
            login.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                login.style.display = 'none';
                
                // 显示星空并初始化
                const container = document.getElementById('canvas-container');
                container.style.opacity = '1';
                initCanvas();
                drawStars();
                
                // 显示主界面
                document.getElementById('dashboard').style.display = 'grid';
            }, 1000);
        }

        // --- 标签页切换 ---
        function switchTab(type, el) {
            // 切换内容
            document.querySelectorAll('.info-content').forEach(c => c.classList.remove('active'));
            document.getElementById('content-' + type).classList.add('active');
            
            // 切换按钮样式
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
