<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Countdown to 06.01 | Kivotos</title>
    <style>
        :root {
            --ba-blue: #00aeef;
            --ba-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #005a8d 0%, #00aeef 100%);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        /* 背景流星效果 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh) translateX(0px); }
            to { transform: translateY(110vh) translateX(-200px); }
        }

        /* 蔚蓝档案光环叠加层 */
        .halo-container {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            border: 8px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            z-index: 1;
            /* 模拟BA光环的悬浮感 */
            animation: rotateHalo 20s linear infinite;
        }

        .halo-container::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        @keyframes rotateHalo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 倒计时主体 */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 18vh;
            color: var(--ba-white);
            text-shadow: 0 0 15px rgba(0, 174, 239, 0.5);
        }

        .title {
            font-size: 1.2rem;
            letter-spacing: 5px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        #timer {
            font-size: 5.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums; /* 防止数字宽度不同导致跳动 */
        }

        .unit-label {
            font-size: 1rem;
            margin: 0 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="stars" id="star-container"></div>

    <div class="halo-container"></div>

    <div class="content">
        <div class="title">SCHALE OPERATION ACCESS: 06.01</div>
        <div id="timer">00:00:00:00</div>
    </div>

    <script>
        // 生成随机流星
        function createStars() {
            const container = document.getElementById('star-container');
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 120 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        function updateCountdown() {
            const now = new Date();
            // 如果5月还没过，设为当年的6月1日
            let target = new Date(now.getFullYear(), 5, 1);
            
            // 如果今年6月1日已经过了，则计明年
            if (now > target) {
                target = new Date(now.getFullYear() + 1, 5, 1);
            }

            const diff = target - now;

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);

            const format = (n) => n.toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = 
                `${format(d)}<span class="unit-label">D</span>` +
                `${format(h)}<span class="unit-label">H</span>` +
                `${format(m)}<span class="unit-label">M</span>` +
                `${format(s)}<span class="unit-label">S</span>`;
        }

        createStars();
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
