<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Kivotos Terminal</title>
    <style>
        :root {
            --ba-blue: #00aeef;
            --ba-halo: rgba(163, 228, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #b9d8eb 0%, #eef6fb 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        /* 圣塔光柱装饰 */
        .sanctum-tower {
            position: absolute; bottom: 0; left: 15%; width: 60px; height: 80vh;
            background: linear-gradient(to top, rgba(255,255,255,0.8), transparent);
            filter: blur(5px); z-index: 1;
        }
        .sanctum-tower::after {
            content: ''; position: absolute; top: -100px; left: 50%;
            transform: translateX(-50%); width: 2px; height: 200vh;
            background: white; box-shadow: 0 0 20px white;
        }

        /* 容器 */
        .display-container {
            position: relative; z-index: 10;
            margin-top: 18vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 呼吸光环 */
        .halo {
            position: relative; width: 300px; height: 60px;
            margin-bottom: -15px; perspective: 500px;
        }
        .halo-circle {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid var(--ba-halo); border-radius: 50%;
            transform: rotateX(75deg);
            box-shadow: 0 0 20px var(--ba-halo), inset 0 0 10px var(--ba-halo);
            animation: haloPulse 3s ease-in-out infinite;
        }

        @keyframes haloPulse {
            0%, 100% { opacity: 0.6; transform: rotateX(75deg) scale(1); }
            50% { opacity: 1; transform: rotateX(75deg) scale(1.08); }
        }

        /* 倒计时 */
        #timer {
            font-size: 5.5rem; font-weight: 100; color: #4a5d6a;
            letter-spacing: -2px; margin: 0;
            background: linear-gradient(to bottom, #4a5d6a, #8ba3b3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .unit { font-size: 1.1rem; margin-right: 12px; color: var(--ba-blue); font-weight: bold; }

        /* 底部 Ai 按钮 */
        .bottom-bar {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 20;
        }
        .ai-button {
            background: var(--ba-blue); color: white; border: none;
            padding: 12px 60px; border-radius: 30px;
            font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 174, 239, 0.4);
            transition: transform 0.2s;
        }
        .ai-button:active { transform: scale(0.9); }

        /* 流星 */
        .meteor { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; animation: meteorFall linear forwards; }
        @keyframes meteorFall { 0% { transform: translate(0, 0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translate(-400px, 800px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="sanctum-tower"></div>

    <div class="display-container">
        <div class="halo"><div class="halo-circle"></div></div>
        <div id="timer">00<span class="unit">d</span>00<span class="unit">h</span>00<span class="unit">m</span>00<span class="unit">s</span></div>
    </div>

    <div class="bottom-bar">
        <button class="ai-button" onclick="openDeepSeek()">Ai</button>
    </div>

    <script>
        // 倒计时逻辑
        function update() {
            const target = new Date(2026, 5, 1); 
            const now = new Date();
            const diff = target - now;
            const d = Math.max(0, Math.floor(diff / 86400000));
            const h = Math.max(0, Math.floor((diff / 3600000) % 24));
            const m = Math.max(0, Math.floor((diff / 60000) % 60));
            const s = Math.max(0, Math.floor((diff / 1000) % 60));
            const pad = (n) => n.toString().padStart(2, '0');
            document.getElementById('timer').innerHTML = `${pad(d)}<span class="unit">d</span>${pad(h)}<span class="unit">h</span>${pad(m)}<span class="unit">m</span>${pad(s)}<span class="unit">s</span>`;
        }

        // 核心：优化后的 App 唤起
        function openDeepSeek() {
            const pkg = "com.deepseek.chat";
            // 构造 Android Intent：直接指向应用启动入口
            const intentUri = `intent://#Intent;package=${pkg};category=android.intent.category.LAUNCHER;end`;
            
            // 尝试唤起
            window.location.href = intentUri;

            // 如果没跳走，给个优雅的反馈
            setTimeout(() => {
                if (!document.hidden) {
                    console.log("If the app didn't open, it might not be installed.");
                }
            }, 2000);
        }

        // 随机流星
        function spawnMeteor() {
            const m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.top = '-10px';
            m.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 3000);
        }

        setInterval(update, 1000);
        setInterval(spawnMeteor, 3000);
        update();
    </script>
</body>
</html>
