<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Blue Archive - Kivotos 06.01</title>
    <style>
        :root {
            --ba-sky: #cce7f5;
            --ba-blue: #00aeef;
            --ba-halo: rgba(163, 228, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 还原图中的明亮天空色 */
            background: linear-gradient(to bottom, #b9d8eb 0%, #eef6fb 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        /* 背景装饰：远处的圣塔光柱 */
        .sanctum-tower {
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 60px;
            height: 80vh;
            background: linear-gradient(to top, rgba(255,255,255,0.8), transparent);
            filter: blur(5px);
            z-index: 1;
        }
        .sanctum-tower::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 200vh;
            background: white;
            box-shadow: 0 0 20px white;
        }

        /* 背景装饰：图中天空的圆环波纹 */
        .sky-ripple {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 400px;
            height: 200px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: rotateX(75deg);
            z-index: 1;
        }

        /* 倒计时主容器 */
        .display-container {
            position: relative;
            z-index: 10;
            margin-top: 18vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 重点：角色风格光环 */
        .halo {
            position: relative;
            width: 280px;
            height: 60px;
            margin-bottom: -10px; /* 让光环稍微靠近文字 */
            perspective: 500px;
        }

        .halo-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid var(--ba-halo);
            border-radius: 50%;
            transform: rotateX(75deg);
            box-shadow: 0 0 15px var(--ba-halo), inset 0 0 10px var(--ba-halo);
            animation: haloPulse 3s ease-in-out infinite;
        }

        @keyframes haloPulse {
            0%, 100% { opacity: 0.5; transform: rotateX(75deg) scale(1); }
            50% { opacity: 1; transform: rotateX(75deg) scale(1.05); }
        }

        /* 倒计时文字：干净、现代 */
        .timer-text {
            text-align: center;
            color: #4a5d6a; /* 深灰蓝色，更有质感 */
            font-weight: 200;
        }

        #timer {
            font-size: 5.5rem;
            font-weight: 100;
            letter-spacing: -2px;
            margin: 0;
            /* 模拟图中的清透感 */
            background: linear-gradient(to bottom, #4a5d6a, #8ba3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .unit {
            font-size: 1rem;
            margin-right: 15px;
            color: var(--ba-blue);
            font-weight: bold;
        }

        /* 流星效果 */
        .meteor {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px white;
            animation: meteorFall linear forwards;
            z-index: 2;
        }

        @keyframes meteorFall {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-300px, 600px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="sanctum-tower"></div>
    <div class="sky-ripple" style="width: 600px; left: 5%;"></div>
    <div class="sky-ripple" style="width: 400px; top: 15%;"></div>

    <div class="display-container">
        <div class="halo">
            <div class="halo-circle"></div>
        </div>
        
        <div class="timer-text">
            <div style="letter-spacing: 5px; opacity: 0.7; font-size: 0.9rem;">REMAINING TIME</div>
            <div id="timer">00<span class="unit">d</span>00<span class="unit">h</span>00<span class="unit">m</span>00<span class="unit">s</span></div>
        </div>
    </div>

    <script>
        function update() {
            const target = new Date(2026, 5, 1); 
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('timer').innerText = "00:00:00:00";
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);

            const pad = (n) => n.toString().padStart(2, '0');

            document.getElementById('timer').innerHTML = 
                `${pad(d)}<span class="unit">d</span>` +
                `${pad(h)}<span class="unit">h</span>` +
                `${pad(m)}<span class="unit">m</span>` +
                `${pad(s)}<span class="unit">s</span>`;
        }

        function spawnMeteor() {
            const m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = (Math.random() * 100 + 20) + 'vw';
            m.style.top = '-10px';
            m.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 4000);
        }

        setInterval(update, 1000);
        setInterval(spawnMeteor, 2000);
        update();
    </script>
</body>
</html>
