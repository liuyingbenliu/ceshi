<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield | 极效协议终端</title>
    <style>
        :root {
            --accent: #ff4d00;
            --accent-glow: rgba(255, 77, 0, 0.5);
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); overflow: hidden;
            color: #fff; font-family: "Orbitron", "Segoe UI", sans-serif;
        }

        /* --- 华丽入场扫描线 --- */
        #warp-line {
            position: fixed; top: 50%; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--accent);
            z-index: 1000; transform: scaleX(0); opacity: 0;
            transition: transform 0.5s ease-in, opacity 0.2s;
        }

        /* --- 启动屏 --- */
        #splash-screen {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 100; background: #000; transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .auth-card {
            padding: 60px; border: 1px solid var(--glass-border);
            background: var(--glass); backdrop-filter: blur(15px);
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .auth-card h1 { font-size: 4rem; letter-spacing: 20px; margin: 0; font-weight: 900; text-shadow: 0 0 15px var(--accent-glow); }
        .auth-card p { color: var(--accent); font-size: 0.9rem; letter-spacing: 6px; margin: 20px 0 50px; opacity: 0.8; }

        .btn-launch {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 18px 60px; cursor: pointer;
            letter-spacing: 8px; transition: 0.4s; font-weight: bold;
            position: relative; overflow: hidden;
        }

        .btn-launch:hover {
            background: var(--accent); color: #fff; box-shadow: 0 0 40px var(--accent);
            transform: translateY(-2px);
        }

        /* --- 星轨背景 --- */
        #star-canvas { position: fixed; inset: 0; z-index: 1; opacity: 0; transition: opacity 2s; }

        /* --- 主UI面板 --- */
        #main-ui {
            position: fixed; inset: 0; z-index: 10; display: none;
            padding: 80px; grid-template-columns: 450px 1fr; align-items: center;
        }

        .side-panel {
            background: var(--glass); border-left: 5px solid var(--accent);
            padding: 40px; backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            transform: perspective(1000px) rotateY(15deg);
            opacity: 0; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .side-panel.active { opacity: 1; transform: perspective(1000px) rotateY(0deg); }

        .panel-tag { color: var(--accent); font-size: 0.75rem; margin-bottom: 15px; font-family: monospace; }
        .panel-title { font-size: 2.4rem; margin: 0 0 25px 0; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .panel-body { color: #ddd; line-height: 2; font-size: 1rem; margin-bottom: 40px; }

        /* 装饰小动画 */
        .glitch-bar {
            width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent), transparent);
            position: relative; overflow: hidden;
        }
        .glitch-bar::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: white; animation: scan-anim 2s infinite;
        }
        @keyframes scan-anim { 100% { left: 100%; } }

        .nav-footer { position: absolute; bottom: 80px; left: 80px; display: flex; gap: 25px; }
        .nav-btn {
            padding: 12px 35px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.6); cursor: pointer;
            font-size: 0.8rem; letter-spacing: 3px; transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,77,0,0.1); }

    </style>
</head>
<body>

    <div id="warp-line"></div>

    <div id="splash-screen">
        <div class="auth-card">
            <h1>ENDFIELD</h1>
            <p>NEURAL LINK ESTABLISHED</p>
            <button class="btn-launch" onclick="triggerWarp()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <canvas id="star-canvas"></canvas>

    <div id="main-ui">
        <div class="side-panel" id="side-panel">
            <div class="panel-tag">// PROTOCOL_03_ACTIVE</div>
            <h2 id="ui-header" class="panel-title">终端已接入</h2>
            <div id="ui-body" class="panel-body">
                欢迎，操作员。正在同步塔卫二（Talos-II）高轨道卫星数据。
                全频谱彩色星轨监测已开启。
            </div>
            <div class="glitch-bar"></div>
        </div>

        <div class="nav-footer">
            <div class="nav-btn active" onclick="updateContent('home', this)">实时同步</div>
            <div class="nav-btn" onclick="updateContent('info', this)">能源分析</div>
            <div class="nav-btn" onclick="location.reload()">强制脱离</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let speedMultiplier = 1;
        const starCount = 400;
        
        const colors = [
            'rgba(255, 77, 0, ',   // 终末地橙
            'rgba(0, 200, 255, ',  // 冰蓝
            'rgba(200, 100, 255, ', // 灵能紫
            'rgba(255, 255, 255, '  // 纯白
        ];

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.dist = Math.sqrt(Math.pow(this.x - canvas.width/2, 2) + Math.pow(this.y - canvas.height/2, 2));
                this.angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                this.size = Math.random() * 3 + 2;
                this.speed = (Math.random() * 0.002 + 0.0005); 
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                this.brightness = Math.random() * 0.6 + 0.4;
            }
            update() {
                this.angle += this.speed * speedMultiplier;
            }
            draw() {
                const x = canvas.width/2 + Math.cos(this.angle) * this.dist;
                const y = canvas.height/2 + Math.sin(this.angle) * this.dist;
                // 增加尾迹拉伸感
                const trailAngle = this.angle - (this.speed * 5 * speedMultiplier);
                const lastX = canvas.width/2 + Math.cos(trailAngle) * this.dist;
                const lastY = canvas.height/2 + Math.sin(trailAngle) * this.dist;

                ctx.beginPath();
                ctx.strokeStyle = this.colorBase + this.brightness + ')';
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < starCount; i++) stars.push(new Star());
        }

        function animate() {
            ctx.fillStyle = `rgba(0, 0, 0, ${speedMultiplier > 5 ? 0.15 : 0.06})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        function triggerWarp() {
            const warpLine = document.getElementById('warp-line');
            const splash = document.getElementById('splash-screen');
            
            // 1. 扫描线激活
            warpLine.style.opacity = '1';
            warpLine.style.transform = 'scaleX(1)';
            
            setTimeout(() => {
                // 2. 启动屏炸开渐隐
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.5)';
                
                // 3. 进入主界面准备
                document.getElementById('star-canvas').style.opacity = '1';
                document.getElementById('main-ui').style.display = 'grid';
                initStars();
                animate();

                // 4. 加速特效 (Warp Speed)
                speedMultiplier = 20;
                let decelerate = setInterval(() => {
                    speedMultiplier *= 0.85;
                    if(speedMultiplier <= 1.2) {
                        speedMultiplier = 1;
                        clearInterval(decelerate);
                        // 5. UI 面板划入
                        document.getElementById('side-panel').classList.add('active');
                    }
                }, 50);

                setTimeout(() => { warpLine.style.opacity = '0'; }, 300);
            }, 600);
        }

        function updateContent(type, el) {
            const header = document.getElementById('ui-header');
            const body = document.getElementById('ui-body');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            if(type === 'home') {
                header.innerText = "终端已接入";
                body.innerText = "欢迎，操作员。正在同步塔卫二（Talos-II）高轨道卫星数据。全频谱彩色星轨监测已开启。";
            } else {
                header.innerText = "高能读数警告";
                body.innerText = "检测到严重的侵蚀粒子（Erosion）浓度波动。星轨呈现紫色偏振。建议立即强化护盾协议。";
            }
        }

        window.addEventListener('resize', initStars);
    </script>
</body>
</html>
